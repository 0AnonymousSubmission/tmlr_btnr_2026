# @package _global_
# Auto-generated test config for baseline ExactGP on realstate
# Best config from ablation: kernel_type=matern, use_ard=False

defaults:
  - /training/test/_base_uncertainty

# Baseline-specific settings
training:
  n_epochs: 200
  batch_size: 256

method:
  name: baseline
  bond_prior_alpha: 0
  warmup_epochs: 0

dataset:
  added_bias: false

model:
  kernel_type: "matern"
  use_ard: False

output:
  save_models: false
  results_dir: tests_uncertainty/baseline/${dataset.name}/${model.name}/kernel_typematern_use_ardFalse

hydra:
  # ExactGP training is deterministic; run a single seed instead of the full sweep.
  sweeper:
    params:
      seed: "923"
  sweep:
    dir: tests_uncertainty_runs/baseline/${dataset.name}/${model.name}
    subdir: kernel_typematern_use_ardFalse/seed${seed}
