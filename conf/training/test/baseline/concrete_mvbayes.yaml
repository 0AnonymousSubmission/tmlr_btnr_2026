# @package _global_
# Auto-generated test config for baseline MvBayes on concrete
# Best config from ablation: maxInt=2, maxBasis=50

defaults:
  - /training/test/_base_uncertainty

# Baseline-specific settings
training:
  n_epochs: 200
  batch_size: 256

method:
  name: baseline
  bond_prior_alpha: 0
  warmup_epochs: 0

dataset:
  added_bias: false

model:
  maxInt: 2
  maxBasis: 50

output:
  save_models: false
  results_dir: tests_uncertainty/baseline/${dataset.name}/${model.name}/maxBasis50_maxInt2

hydra:
  sweep:
    dir: tests_uncertainty_runs/baseline/${dataset.name}/${model.name}
    subdir: maxBasis50_maxInt2/seed${seed}
